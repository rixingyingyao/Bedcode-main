<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="/manifest.json">
<title>BedCode</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--surface:#161616;--surface2:#1e1e1e;--border:#2a2a2a;--accent:#c45;--text:#d4d4d4;--text2:#999;--sent-bg:#2a2a2a;--recv-bg:#1a1a1a;--hover:#222}
[data-theme="light"]{--bg:#fafafa;--surface:#fff;--surface2:#f0f0f0;--border:#e0e0e0;--accent:#c45;--text:#333;--text2:#888;--sent-bg:#e8e8e8;--recv-bg:#fff;--hover:#f0f0f0}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}

/* Header */
.header{background:var(--surface);padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0}
.header .dot{width:8px;height:8px;border-radius:50%;background:#555;flex-shrink:0}
.header .dot.on{background:#4a4}
.header .info{flex:1;min-width:0}
.header .title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header .subtitle{font-size:11px;color:var(--text2);margin-top:1px}
.header .badge{font-size:11px;padding:2px 8px;border-radius:4px;background:var(--surface2);color:var(--text2);font-weight:500}
.header .badge.active{background:#f0a500;color:#000}
.header button{background:none;border:none;color:var(--text2);font-size:15px;cursor:pointer;padding:4px 6px;border-radius:6px}
.header button:hover{background:var(--hover)}

/* Chat area */
#chat{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.bubble{max-width:85%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;position:relative}
.bubble.sent{align-self:flex-end;background:var(--sent-bg);border-bottom-right-radius:4px}
.bubble.recv{align-self:flex-start;background:var(--recv-bg);border:1px solid var(--border);border-bottom-left-radius:4px;cursor:pointer}
.bubble .meta{font-size:11px;color:var(--text2);margin-top:4px}
.bubble img{max-width:100%;border-radius:8px;margin-top:6px;cursor:pointer}
.bubble pre{background:var(--bg);padding:8px;border-radius:6px;overflow-x:auto;font-size:12px;margin-top:6px;font-family:'SF Mono',Consolas,monospace}
.bubble.system{align-self:center;background:none;color:var(--text2);font-size:12px;padding:4px 0}

/* Screenshot overlay */
#ss-area{display:none;position:relative;flex-shrink:0;background:#000;border-top:1px solid var(--border);max-height:40vh;overflow:hidden}
[data-theme="light"] #ss-area{background:#e8e8e8}
#ss-area img{width:100%;height:100%;object-fit:contain;max-height:40vh}
#ss-area .close{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* Text panel */
#text-panel{height:0;overflow-y:auto;background:var(--surface);border-top:1px solid var(--border);transition:height .2s;font-family:'SF Mono',Consolas,monospace;font-size:12px;padding:0;white-space:pre-wrap;word-break:break-all;color:var(--text2)}
#text-panel.open{height:30vh;padding:10px 14px}

/* Quick actions */
.actions{display:flex;gap:4px;padding:6px 12px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.actions button{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.actions button:active{opacity:.7}
.actions button.danger{border-color:var(--accent);color:var(--accent)}

/* Image preview */
#img-preview{display:none;align-items:center;gap:8px;padding:6px 14px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
#img-preview img{height:36px;border-radius:6px}
#img-preview .name{font-size:12px;color:var(--text2);flex:1}
#img-preview .rm{color:var(--accent);cursor:pointer;font-size:14px;padding:4px}

/* Input */
.input-row{display:flex;gap:8px;padding:8px 12px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;align-items:flex-end}
.input-row input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:22px;font-size:14px;outline:none}
.input-row input:focus{border-color:#555}
[data-theme="light"] .input-row input:focus{border-color:#aaa}
.input-row .send{background:var(--accent);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.input-row .send:active{opacity:.8}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:10;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:14px;padding:16px;width:90%;max-width:380px;max-height:70vh;overflow-y:auto;border:1px solid var(--border)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:12px}
.modal .item{padding:10px 12px;border:1px solid var(--border);border-radius:10px;margin-bottom:6px;cursor:pointer;font-size:13px}
.modal .item:active{background:var(--hover)}
.modal .item.current{border-color:#4a4}
.modal .item .sub{font-size:11px;color:var(--text2);margin-top:2px}
.modal .close{float:right;background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer}

#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;display:none;z-index:99;backdrop-filter:blur(4px)}
</style>
</head>
<body>

<div class="header">
  <div class="dot" id="conn-dot"></div>
  <div class="info">
    <div class="title" id="hdr-title">BedCode</div>
    <div class="subtitle" id="hdr-sub">远程控制台</div>
  </div>
  <span class="badge" id="hdr-state">--</span>
  <button id="ss-btn" title="截图">🖥</button>
  <button id="txt-btn" title="终端">⌨</button>
  <button id="theme-btn">🌙</button>
</div>

<div id="chat"></div>

<div id="ss-area">
  <img id="ss-img" alt="screenshot">
  <button class="close" onclick="document.getElementById('ss-area').style.display='none'">×</button>
</div>

<div id="text-panel"></div>

<div class="actions">
  <button onclick="doScreenshot()">📷 截屏</button>
  <button onclick="doWindows()">🪟 窗口</button>
  <button onclick="doGrab()">📋 抓取</button>
  <button onclick="doRefresh()">🔄 刷新</button>
  <button onclick="doUndo()">↩ 撤销</button>
  <button onclick="doBreak()" class="danger">⏹ 中断</button>
</div>

<div id="img-preview"><img id="img-thumb"><span class="name" id="img-name"></span><span class="rm" onclick="clearImage()">✕</span></div>

<div class="input-row">
  <input id="msg-input" placeholder="发消息给 Claude..." autocomplete="off">
  <button class="send" onclick="doSend()">↑</button>
</div>

<div class="modal-bg" id="win-modal"><div class="modal"><button class="close" onclick="closeWin()">×</button><h3>窗口列表</h3><div id="win-list"></div></div></div>
<div id="toast"></div>

<script>
const API = location.origin;
let TOKEN = localStorage.getItem('bedcode_token') || '';
let ws = null, reconnTimer = null, _pendImg = null;

// ── Theme ──
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('bedcode_theme', t);
  document.getElementById('theme-btn').textContent = t === 'dark' ? '🌙' : '☀️';
}
setTheme(localStorage.getItem('bedcode_theme') || 'dark');
document.getElementById('theme-btn').onclick = () =>
  setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');

// ── Auth ──
if (!TOKEN) { TOKEN = prompt('输入 API Token:') || ''; if (TOKEN) localStorage.setItem('bedcode_token', TOKEN); }
const authH = () => ({'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'});

// ── Toast ──
function toast(m, ms=1500) { const e=document.getElementById('toast'); e.textContent=m; e.style.display='block'; setTimeout(()=>e.style.display='none',ms); }

// ── Chat bubbles ──
let _msgs = JSON.parse(localStorage.getItem('bedcode_chat') || '[]');

function addMsg(text, dir, extra) {
  const t = new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  const m = {t, d: dir, x: text.substring(0,3000), ...extra};
  _msgs.push(m);
  if (_msgs.length > 80) _msgs = _msgs.slice(-50);
  localStorage.setItem('bedcode_chat', JSON.stringify(_msgs));
  renderChat();
}

function renderChat() {
  const c = document.getElementById('chat');
  c.innerHTML = '';
  _msgs.slice(-50).forEach(m => {
    const div = document.createElement('div');
    if (m.d === 'sys') {
      div.className = 'bubble system';
      div.textContent = m.x;
    } else {
      div.className = 'bubble ' + m.d;
      let html = esc(m.x);
      if (m.img) html = `<img src="${m.img}" alt="screenshot">`;
      html += `<div class="meta">${m.t}</div>`;
      div.innerHTML = html;
      if (m.d === 'recv') {
        div.onclick = () => {
          const p = document.getElementById('text-panel');
          p.textContent = m.x;
          p.classList.add('open');
        };
      }
    }
    c.appendChild(div);
  });
  c.scrollTop = c.scrollHeight;
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ── API ──
async function api(path, opts={}) {
  try {
    const r = await fetch(API+'/api'+path, {headers:authH(), ...opts});
    if (r.status===401) { toast('Token 无效'); return null; }
    if (r.headers.get('content-type')?.includes('image')) return r;
    return await r.json();
  } catch(e) { toast('请求失败'); return null; }
}

async function doScreenshot() {
  const r = await fetch(API+'/api/screenshot', {headers:authH()});
  if (!r.ok) { toast('截屏失败'); return; }
  const blob = await r.blob();
  showSS(URL.createObjectURL(blob));
}

function showSS(src) {
  const area = document.getElementById('ss-area');
  document.getElementById('ss-img').src = src;
  area.style.display = 'block';
}

async function doSend() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (_pendImg) {
    const fd = new FormData();
    fd.append('file', _pendImg.blob, _pendImg.name);
    fd.append('caption', text);
    input.value = ''; clearImage();
    toast('📤 上传中...');
    try {
      const r = await fetch(API+'/api/image', {method:'POST', headers:{'Authorization':'Bearer '+TOKEN}, body:fd});
      const j = await r.json();
      if (j.status==='sent') { toast('🖼 已发送'); addMsg('🖼 '+(text||'图片'), 'sent'); startPoll(); }
      else if (j.status==='queued') { toast('📋 图片已排队 #'+j.position); addMsg('🖼 '+(text||'图片')+' (排队)', 'sent'); }
      else toast(j.message||'失败');
    } catch(e) { toast('上传失败'); }
    return;
  }
  if (!text) return;
  input.value = '';
  const r = await api('/send', {method:'POST', body:JSON.stringify({text})});
  if (!r) return;
  if (r.status==='sent') { addMsg(text,'sent'); startPoll(); }
  else if (r.status==='queued') { addMsg(text,'sent'); toast('📋 排队 #'+r.position); }
  else toast(r.message||'发送失败');
}

async function doBreak() { const r=await api('/break',{method:'POST'}); if(r?.status==='ok') toast('⏹ 已中断'); }
async function doUndo() { const r=await api('/undo',{method:'POST'}); if(r?.status==='ok') toast('↩ 已撤销'); }

async function doGrab() {
  const r = await api('/grab');
  if (!r) return;
  if (r.text && r.text.trim().length > 10) {
    document.getElementById('text-panel').textContent = r.text;
    document.getElementById('text-panel').classList.add('open');
  }
}

async function doRefresh() {
  const r = await api('/status');
  if (!r) return;
  updateHeader(r);
  toast('已刷新');
}

async function doWindows() {
  const r = await api('/windows');
  if (!r) return;
  const list = document.getElementById('win-list');
  list.innerHTML = '';
  if (!r.windows.length) { list.innerHTML='<p style="color:var(--text2)">无窗口</p>'; }
  r.windows.forEach(w => {
    const div = document.createElement('div');
    div.className = 'item'+(w.current?' current':'');
    div.innerHTML = `<div>${w.label?'📌'+w.label+' ':''}${esc(w.title)}</div><div class="sub">${w.state} · ${w.handle}</div>`;
    div.onclick = async () => { await api('/target',{method:'POST',body:JSON.stringify({handle:w.handle})}); toast('已切换'); closeWin(); doRefresh(); };
    list.appendChild(div);
  });
  document.getElementById('win-modal').classList.add('open');
}
function closeWin() { document.getElementById('win-modal').classList.remove('open'); }

// ── Pending image ──
function setImage(blob, name) {
  _pendImg = {blob, name};
  document.getElementById('img-thumb').src = URL.createObjectURL(blob);
  document.getElementById('img-name').textContent = name;
  document.getElementById('img-preview').style.display = 'flex';
}
function clearImage() { _pendImg=null; document.getElementById('img-preview').style.display='none'; }

// ── Header ──
function updateHeader(data) {
  document.getElementById('hdr-title').textContent = (data.label?'📌'+data.label+' ':'') + (data.title||'BedCode').substring(0,40);
  const st = document.getElementById('hdr-state');
  const map = {thinking:'思考中',idle:'空闲',unknown:'--'};
  st.textContent = map[data.state]||data.state;
  st.className = 'badge'+(data.state==='thinking'?' active':'');
}

// ── WebSocket ──
function connectWS() {
  if (ws && ws.readyState<=1) return;
  const proto = location.protocol==='https:'?'wss:':'ws:';
  ws = new WebSocket(proto+'//'+location.host+'/ws');
  ws.onopen = () => { ws.send(JSON.stringify({token:TOKEN})); document.getElementById('conn-dot').classList.add('on'); if(reconnTimer){clearTimeout(reconnTimer);reconnTimer=null;} };
  ws.onmessage = e => { try{handleWS(JSON.parse(e.data));}catch(err){} };
  ws.onclose = () => { document.getElementById('conn-dot').classList.remove('on'); reconnTimer=setTimeout(connectWS,3000); };
  ws.onerror = () => ws.close();
}

function handleWS(msg) {
  switch(msg.type) {
    case 'screenshot':
      if (msg.image_base64) showSS('data:image/png;base64,'+msg.image_base64);
      break;
    case 'status':
      if (msg.text) document.getElementById('hdr-title').textContent=msg.text.substring(0,50);
      if (msg.state==='thinking') startPoll();
      break;
    case 'text': case 'result':
      if (msg.text) {
        addMsg(msg.text.substring(0,2000), 'recv');
        document.getElementById('text-panel').textContent = msg.text;
        document.getElementById('text-panel').classList.add('open');
      }
      break;
    case 'completion':
      addMsg('✅ '+(msg.label||'')+' 完成', 'sys');
      doScreenshot(); doGrab();
      break;
  }
}

// ── Polling ──
let _pollTimer=null, _lastHash='', _pollMs=10000;

async function pollTick() {
  const r = await api('/status');
  if (!r) return;
  updateHeader(r);
  const nms = r.state==='thinking'?3000:10000;
  if (nms!==_pollMs) { _pollMs=nms; clearInterval(_pollTimer); _pollTimer=setInterval(pollTick,_pollMs); }
  const resp = await fetch(API+'/api/screenshot',{headers:authH()});
  if (resp.ok) {
    const blob = await resp.blob();
    const h = blob.size.toString();
    if (h!==_lastHash) { _lastHash=h; showSS(URL.createObjectURL(blob)); }
  }
}
function startPoll() { if(_pollTimer)return; _pollTimer=setInterval(pollTick,_pollMs); pollTick(); }

// ── Init ──
document.getElementById('ss-btn').onclick = doScreenshot;
document.getElementById('txt-btn').onclick = () => document.getElementById('text-panel').classList.toggle('open');
document.getElementById('msg-input').addEventListener('keydown', e => { if(e.key==='Enter') doSend(); });

document.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (let i=0; i<items.length; i++) {
    if (items[i].type.startsWith('image/')) {
      e.preventDefault();
      const blob = items[i].getAsFile();
      if (!blob) return;
      setImage(blob, 'paste.png');
      toast('📎 图片已就绪');
      return;
    }
  }
});

renderChat();
connectWS();
doRefresh().then(() => { doScreenshot(); startPoll(); });
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
</body>
</html>
